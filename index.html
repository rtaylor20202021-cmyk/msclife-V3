<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Manager V3</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1a1a1a;
            --accent: #00ff88;
            --text: #ffffff;
            --secondary: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #status {
            background: #000;
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            color: var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #output {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--secondary);
        }

        #output b { color: var(--text); border-bottom: 1px solid #333; }

        .controls-wrapper {
            background-color: var(--panel);
            padding: 20px;
            border-top: 1px solid #333;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        button {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            border-radius: 4px;
        }

        button:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-2px);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="status">
